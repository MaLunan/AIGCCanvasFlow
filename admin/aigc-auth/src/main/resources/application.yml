server:
  port: 8081

spring:
  application:
    name: aigc-auth
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

jwt:
  secret: aigc-canvas-flow-jwt-secret-key-2024-minimum-32-chars
  access-token-expire: 3600000
  refresh-token-expire: 604800000
